<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Profile - Study Planner</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Poppins', sans-serif;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: linear-gradient(135deg, #6c96e3, #243b55);
      transition: background 0.3s;
    }

    body.dark {
      background: linear-gradient(135deg, #0f172a, #1e293b);
    }

    /* ── CARD ── */
    .profile-card {
      background: rgba(255, 255, 255, 0.12);
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);
      border: 1px solid rgba(255, 255, 255, 0.2);
      padding: 48px 40px;
      border-radius: 24px;
      text-align: center;
      width: 360px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
    }

    body.dark .profile-card {
      background: rgba(30, 41, 59, 0.75);
      border-color: rgba(129, 140, 248, 0.2);
    }

    /* ── AVATAR ── */
    .avatar {
      width: 90px;
      height: 90px;
      border-radius: 50%;
      background: linear-gradient(135deg, #4f46e5, #06b6d4);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 2.2rem;
      margin: 0 auto 18px;
      color: #fff;
      box-shadow: 0 8px 20px rgba(79, 70, 229, 0.4);
    }

    /* ── NAME & EMAIL ── */
    .profile-card h2 {
      font-size: 1.3rem;
      font-weight: 700;
      color: #fff;
      margin-bottom: 6px;
    }

    .profile-email {
      font-size: 0.85rem;
      color: rgba(255, 255, 255, 0.65);
      margin-bottom: 32px;
    }

    /* ── BUTTONS ── */
    .actions {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .logout-btn, .delete-btn {
      width: 100%;
      padding: 13px;
      border: none;
      border-radius: 12px;
      font-size: 0.95rem;
      font-weight: 600;
      font-family: 'Poppins', sans-serif;
      cursor: pointer;
      transition: transform 0.2s, box-shadow 0.2s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }

    .logout-btn {
      background: linear-gradient(135deg, #4facfe, #00f2fe);
      color: #fff;
      box-shadow: 0 4px 15px rgba(79, 172, 254, 0.4);
    }

    .logout-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 20px rgba(79, 172, 254, 0.5);
    }

    .delete-btn {
      background: linear-gradient(135deg, #ef4444, #dc2626);
      color: #fff;
      box-shadow: 0 4px 15px rgba(239, 68, 68, 0.35);
    }

    .delete-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 20px rgba(239, 68, 68, 0.45);
    }

    /* ── MODAL OVERLAY ── */
    /* Using a normal-flow wrapper instead of position:fixed so height is correct */
    .modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.55);
      z-index: 999;
      align-items: center;
      justify-content: center;
    }

    .modal-overlay.open {
      display: flex;
    }

    .modal-box {
      background: #fff;
      border-radius: 18px;
      padding: 36px 32px;
      text-align: center;
      width: 320px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.25);
    }

    body.dark .modal-box {
      background: #1e293b;
      color: #e2e8f0;
    }

    .modal-box p {
      font-size: 1rem;
      font-weight: 500;
      margin-bottom: 24px;
      line-height: 1.6;
      color: inherit;
    }

    .modal-actions {
      display: flex;
      gap: 10px;
      justify-content: center;
    }

    .modal-actions button {
      padding: 10px 24px;
      border: none;
      border-radius: 10px;
      font-size: 0.9rem;
      font-weight: 600;
      font-family: 'Poppins', sans-serif;
      cursor: pointer;
      transition: transform 0.2s;
    }

    .modal-actions button:hover { transform: translateY(-1px); }

    .confirm-btn {
      background: #ef4444;
      color: #fff;
    }

    .cancel-btn {
      background: #e2e8f0;
      color: #334155;
    }

    body.dark .cancel-btn {
      background: #334155;
      color: #e2e8f0;
    }

    /* ── TOAST ── */
    .toast {
      position: fixed;
      bottom: 28px;
      right: 28px;
      padding: 12px 22px;
      border-radius: 10px;
      color: #fff;
      font-size: 0.88rem;
      font-weight: 600;
      z-index: 9999;
      opacity: 0;
      transform: translateY(16px);
      transition: opacity 0.3s, transform 0.3s;
      pointer-events: none;
    }

    .toast.show {
      opacity: 1;
      transform: translateY(0);
    }
  </style>
</head>
<body>

  <div class="profile-card">

    <!-- Avatar -->
    <div class="avatar">
      <i class="fa-solid fa-user"></i>
    </div>

    <!-- Name -->
    <h2 id="username">Welcome, User</h2>

    <!-- Email -->
    <p class="profile-email" id="profileEmail"></p>

    <!-- Actions -->
    <div class="actions">
      <button class="logout-btn" onclick="logout()">
        <i class="fa-solid fa-right-from-bracket"></i> Logout
      </button>
      <button class="delete-btn" onclick="openModal()">
        <i class="fa-solid fa-trash"></i> Delete Account
      </button>
    </div>

  </div>

  <!-- Delete Confirmation Modal -->
  <div class="modal-overlay" id="modal">
    <div class="modal-box">
      <p>Are you sure you want to permanently delete your account? This cannot be undone.</p>
      <div class="modal-actions">
        <button class="confirm-btn" onclick="deleteAccount()">Yes, Delete</button>
        <button class="cancel-btn" onclick="closeModal()">Cancel</button>
      </div>
    </div>
  </div>

  <!-- Toast -->
  <div class="toast" id="toast"></div>

  <script>
    // ✅ FIX: Auth guard — if not logged in, send to login page
    if (!localStorage.getItem("loggedInUser")) {
      window.location.replace("login.html");
    }

    // ── THEME ──
    window.onload = function () {
      if (localStorage.getItem("theme") === "dark") {
        document.body.classList.add("dark");
      }

      // ✅ FIX: Read userEmail saved by login.js (was reading wrong key "user" before)
      const email = localStorage.getItem("userEmail") || "";
      const name  = email ? email.split("@")[0] : "User";

      document.getElementById("username").textContent    = "Welcome, " + name;
      document.getElementById("profileEmail").textContent = email;
    };

    // ── TOAST ──
    function showToast(msg, color) {
      const toast = document.getElementById("toast");
      toast.textContent = msg;
      toast.style.background = color || "#333";
      toast.classList.add("show");
      setTimeout(() => toast.classList.remove("show"), 2500);
    }

    // ── LOGOUT ──
    // ✅ FIX: Remove "loggedInUser" (was removing wrong key "user" before)
    function logout() {
      localStorage.removeItem("loggedInUser");
      window.location.href = "login.html";
    }

    // ── MODAL ──
    function openModal()  { document.getElementById("modal").classList.add("open"); }
    function closeModal() { document.getElementById("modal").classList.remove("open"); }

    // Close modal on overlay click
    document.getElementById("modal").addEventListener("click", function (e) {
      if (e.target === this) closeModal();
    });

    // ── DELETE ACCOUNT ──
    // ✅ FIX: Only removes this user from the users array, does NOT wipe all localStorage
    //         Removes loggedInUser and userEmail but keeps other users' data intact
    function deleteAccount() {
      const email = localStorage.getItem("userEmail");

      // Remove this user from the users array
      let users = JSON.parse(localStorage.getItem("users")) || [];
      users = users.filter(u => u.email !== email);
      localStorage.setItem("users", JSON.stringify(users));

      // Clear only the login session keys
      localStorage.removeItem("loggedInUser");
      localStorage.removeItem("userEmail");

      // Also clear this user's tasks
      localStorage.removeItem("tasks");

      closeModal();
      showToast("Account deleted successfully.", "#ef4444");

      setTimeout(() => {
        window.location.href = "signup.html";
      }, 1500);
    }
  </script>

</body>
</html>
