<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign Up - Study Planner</title>
 
  <link rel="stylesheet" href="signup.css">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
 
<body>
 
  <div class="container">
 
    <!-- Branding panel -->
    <div class="left">
      <h1>Create Account</h1>
      <p>Start your journey with Study Planner 🚀</p>
    </div>
 
    <!-- Signup form -->
    <div class="right">
      <h2>Sign Up</h2>
 
      <div class="input-group">
        <input type="text" id="name" placeholder="Enter your Name">
      </div>
 
      <div class="input-group">
        <input type="email" id="email" placeholder="Enter Your Email">
      </div>
 
      <div class="input-group">
        <input type="password" id="password" placeholder="Create a strong password">
        <!-- Password warning box injected here by signup.js -->
      </div>
 
      <div class="input-group">
        <input type="password" id="confirmPassword" placeholder="Confirm Password">
      </div>
      
 
      <div class="input-group">
        <select id="securityQuestion">
          <option value="">Select Security Question</option>
          <option value="person">Name of Your Favourite Person.</option>
          <option value="color">What's Your Favourite Color</option>
          <option value="DOB">What is your DOB?</option>
        </select>
      </div>
 
      <div class="input-group">
        <input type="text" id="securityAnswer" placeholder="Enter your answer">
      </div>
      <button id="signupBtn" class="btn">Create Account</button>
      <div class="links">
        <a href="login.html">Already have an account? Login</a>
      </div>
    </div>
 
  </div>
 
  <script src="signup.js"></script>
</body>
</html>
