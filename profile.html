<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Profile - Study Planner</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>

  <div class="profile-card">

    <!-- Avatar -->
    <div class="avatar">
      <i class="fa-solid fa-user"></i>
    </div>

    <!-- Name -->
    <h2 id="username">Welcome, User</h2>

    <!-- Email -->
    <p class="profile-email" id="profileEmail"></p>

    <!-- Actions -->
    <div class="actions">
      <button class="logout-btn" onclick="logout()">
        <i class="fa-solid fa-right-from-bracket"></i> Logout
      </button>
      <button class="delete-btn" onclick="openModal()">
        <i class="fa-solid fa-trash"></i> Delete Account
      </button>
    </div>

  </div>

  <!-- Delete Confirmation Modal -->
  <div class="modal-overlay" id="modal">
    <div class="modal-box">
      <p>Are you sure you want to permanently delete your account? This cannot be undone.</p>
      <div class="modal-actions">
        <button class="confirm-btn" onclick="deleteAccount()">Yes, Delete</button>
        <button class="cancel-btn" onclick="closeModal()">Cancel</button>
      </div>
    </div>
  </div>

  <!-- Toast -->
  <div class="toast" id="toast"></div>

  <script>
    // ✅ FIX: Auth guard — if not logged in, send to login page
    if (!localStorage.getItem("loggedInUser")) {
      window.location.replace("login.html");
    }

    // ── THEME ──
    window.onload = function () {
      if (localStorage.getItem("theme") === "dark") {
        document.body.classList.add("dark");
      }

      // ✅ FIX: Read userEmail saved by login.js (was reading wrong key "user" before)
      const email = localStorage.getItem("userEmail") || "";
      const name  = email ? email.split("@")[0] : "User";

      document.getElementById("username").textContent    = "Welcome, " + name;
      document.getElementById("profileEmail").textContent = email;
    };

    // ── TOAST ──
    function showToast(msg, color) {
      const toast = document.getElementById("toast");
      toast.textContent = msg;
      toast.style.background = color || "#333";
      toast.classList.add("show");
      setTimeout(() => toast.classList.remove("show"), 2500);
    }

    // ── LOGOUT ──
    // ✅ FIX: Remove "loggedInUser" (was removing wrong key "user" before)
    function logout() {
      localStorage.removeItem("loggedInUser");
      window.location.href = "login.html";
    }

    // ── MODAL ──
    function openModal()  { document.getElementById("modal").classList.add("open"); }
    function closeModal() { document.getElementById("modal").classList.remove("open"); }

    // Close modal on overlay click
    document.getElementById("modal").addEventListener("click", function (e) {
      if (e.target === this) closeModal();
    });

    // ── DELETE ACCOUNT ──
    // ✅ FIX: Only removes this user from the users array, does NOT wipe all localStorage
    //         Removes loggedInUser and userEmail but keeps other users' data intact
    function deleteAccount() {
      const email = localStorage.getItem("userEmail");

      // Remove this user from the users array
      let users = JSON.parse(localStorage.getItem("users")) || [];
      users = users.filter(u => u.email !== email);
      localStorage.setItem("users", JSON.stringify(users));

      // Clear only the login session keys
      localStorage.removeItem("loggedInUser");
      localStorage.removeItem("userEmail");

      // Also clear this user's tasks
      localStorage.removeItem("tasks");

      closeModal();
      showToast("Account deleted successfully.", "#ef4444");

      setTimeout(() => {
        window.location.href = "signup.html";
      }, 1500);
    }
  </script>

</body>
</html>
